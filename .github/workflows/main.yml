name: Build Wireless Auditor APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev gapc autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libaeon-dev
        sudo apt-get install -y python3-pip python3-setuptools python3-dev
        sudo apt-get install -y openjdk-17-jdk unzip zip

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Build Android APK with Buildozer
      run: |
        # أمر بناء التطبيق التلقائي مع الموافقة على شروط الأندرويد SDK
        yes | buildozer android debug

    - name: Upload Finished APK Artifact
      uses: actions/artifacts@v4
      with:
        name: Wireless-Security-Auditor-APK
        path: bin/*.apk
