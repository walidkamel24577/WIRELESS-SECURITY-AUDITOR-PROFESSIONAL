name: Build Android APK with Buildozer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 1. إعداد الـ Java المعتمد لبيئة الأندرويد الحديثة
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 2. تثبيت الحزم والمكتبات المساعدة للينكس
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev liblzma-dev tk-dev build-essential g++

    - name: Install Buildozer and Cython
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython virtualenv

    # 3. الحل الحاسم: تحميل الـ Android SDK الرسمي والموافقة على رخصة جوجل برمجياً بشكل مستقل
    - name: Setup Android SDK & Accept Licenses Privately
      run: |
        mkdir -p /home/runner/android-sdk/cmdline-tools
        cd /home/runner/android-sdk/cmdline-tools
        # تحميل حزمة أدوات سطر أوامر أندرويد الرسمية
        wget https://google.com -O cmdline.zip
        unzip -q cmdline.zip
        mv cmdline-tools latest
        
        # الموافقة على جميع رخص الاستخدام وضخ الإدخال التلقائي لها بنجاح
        yes | /home/runner/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=/home/runner/android-sdk
        
        # تثبيت حزم المنصة المطلوبة لبناء التطبيق مسبقاً
        /home/runner/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=/home/runner/android-sdk "platform-tools" "platforms;android-33" "build-tools;33.0.1"

    # 4. بناء التطبيق وتمرير المسار المرخص الجاهز لـ Buildozer لمنعها من إعادة التحميل والتوقف
    - name: Build APK with Buildozer
      run: |
        export ANDROID_HOME=/home/runner/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        
        # تعديل ملف التكوين لإجبار buildozer على استخدام المسار الخارجي المرخص
        sed -i 's|# android.sdk_path =|android.sdk_path = /home/runner/android-sdk|' buildozer.spec
        
        buildozer android debug

    # 5. رفع ملف الـ APK النهائي والجاهز للتحميل والتثبيت
    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NetworkAuditor-Package
        path: bin/*.apk
